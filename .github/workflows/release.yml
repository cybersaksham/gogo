name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true

permissions:
  contents: write

env:
  GO_VERSION: "1.26.4"

jobs:
  verify:
    name: Full CI Verification
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: gogo
          POSTGRES_USER: gogo
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gogo -d gogo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:4-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GOGO_TEST_POSTGRES_DSN: postgres://gogo@localhost:5432/gogo?sslmode=disable
      GOGO_TEST_REDIS_ADDR: localhost:6379
      GOGO_TEST_RABBITMQ_URL: amqp://localhost:5672/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go mod download
      - run: make ci

  release:
    name: Build And Publish
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Resolve release metadata
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          {
            printf 'GOGO_RELEASE_TAG=%s\n' "$tag"
            printf 'GOGO_RELEASE_VERSION=%s\n' "$version"
            printf 'GOGO_RELEASE_BUILD_DATE=%s\n' "$build_date"
          } >> "$GITHUB_ENV"
      - name: Validate release dry run
        run: |
          go run ./internal/release/cmd/dryrun \
            --tag "$GOGO_RELEASE_TAG" \
            --commit "$GITHUB_SHA" \
            --build-date "$GOGO_RELEASE_BUILD_DATE" \
            --changelog CHANGELOG.md \
            --notes-out release-notes.md
      - name: Build CLI artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          ldflags="-s -w -X github.com/cybersaksham/gogo/internal/version.Version=${GOGO_RELEASE_VERSION} -X github.com/cybersaksham/gogo/internal/version.Commit=${GITHUB_SHA} -X github.com/cybersaksham/gogo/internal/version.BuildDate=${GOGO_RELEASE_BUILD_DATE}"
          while read -r goos goarch; do
            output="dist/gogo_${GOGO_RELEASE_VERSION}_${goos}_${goarch}"
            if [ "$goos" = "windows" ]; then
              output="${output}.exe"
            fi
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "$ldflags" -o "$output" ./cmd/gogo
          done <<'PLATFORMS'
          linux amd64
          linux arm64
          darwin amd64
          darwin arm64
          windows amd64
          windows arm64
          PLATFORMS
          (cd dist && sha256sum * > checksums.txt)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GOGO_RELEASE_TAG" dist/* \
            --title "$GOGO_RELEASE_TAG" \
            --notes-file release-notes.md \
            --verify-tag

{{define "change-list-results"}}
<div class="results">
  <table id="result_list">
    <thead>
      <tr>{{range .ChangeList.Columns}}<th scope="col"><div class="text"><span>{{.Name}}</span></div><div class="clear"></div></th>{{end}}</tr>
    </thead>
    <tbody>
      {{range .ChangeList.Rows}}
      <tr>{{range .Cells}}<td>{{.}}</td>{{end}}</tr>
      {{else}}
      <tr><td>No results found.</td></tr>
      {{end}}
    </tbody>
  </table>
</div>
{{end}}

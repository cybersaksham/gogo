{{define "fieldset"}}
<fieldset class="module aligned"{{if .Name}} aria-labelledby="{{.HeadingID}}"{{end}}>
  {{if .Name}}<h2 id="{{.HeadingID}}" class="fieldset-heading">{{.Name}}</h2>{{end}}
  {{range .Fields}}
  <div class="{{.FieldCSS}}">
    <div>
      <div class="flex-container">
        <label{{if not .Readonly}} for="{{.FieldID}}"{{end}}>{{.Label}}:</label>
        {{if .Readonly}}<div class="readonly">{{.WidgetHTML}}</div>{{else}}{{.WidgetHTML}}{{end}}
      </div>
      {{if .HelpText}}<div class="help">{{.HelpText}}</div>{{end}}
      {{if .Errors}}<ul class="errorlist"><li>{{.Errors}}</li></ul>{{end}}
    </div>
  </div>
  {{end}}
</fieldset>
{{end}}

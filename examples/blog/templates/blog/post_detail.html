{{ define "blog/post_detail.html" }}
<article class="blog-post">
  <header class="blog-post__header">
    <h1>{{ .Post.Title }}</h1>
    <p class="blog-post__meta">{{ .Post.Author.DisplayName }} · {{ .Post.PublishedAt }}</p>
  </header>
  <section class="blog-post__body">{{ .Post.Body }}</section>
  {{ template "blog/comment_form.html" .CommentForm }}
</article>
{{ end }}

name: Publish Docs

on:
  push:
    branches:
      - master
    paths:
      - "docs/public/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/public/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  NODE_VERSION: "22.12.0"

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: docs/public/package-lock.json
      - name: Install dependencies
        run: npm --prefix docs/public ci
      - name: Audit dependencies
        run: npm --prefix docs/public audit --audit-level=moderate
      - name: Check docs
        run: npm --prefix docs/public run check
      - name: Build docs
        run: npm --prefix docs/public run build
      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/public/dist

  deploy:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
